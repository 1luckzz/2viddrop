<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meekz 30%</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1 class="logo">meekz 30%</h1>

    <div class="box">
      <input type="text" id="urlInput" placeholder="Cole o link do vídeo aqui..." autocomplete="off" spellcheck="false" />
      <button id="dlBtn" onclick="startDownload()">Baixar</button>
    </div>

    <div id="progress" class="progress hidden">
      <div class="bar-track"><div id="bar" class="bar-fill"></div></div>
      <p><span id="status">Iniciando...</span> <span id="pct"></span></p>
      <p id="speed"></p>
    </div>

    <p id="error" class="error hidden"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
