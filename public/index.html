<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>site que baixa video, fds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <main>
    <h1 class="logo">site que baixa video, fds</h1>

    <div class="box">
      <input type="text" id="urlInput" placeholder="Cole o link do vídeo aqui..." autocomplete="off" spellcheck="false" />
      <button id="dlBtn" onclick="startDownload()">Baixar</button>
    </div>

    <div id="progress" class="progress hidden">
      <div class="bar-track"><div id="bar" class="bar-fill"></div></div>
      <p><span id="status">Iniciando...</span> <span id="pct"></span></p>
      <p id="speed"></p>
    </div>

    <p id="error" class="error hidden"></p>
  </main>

  <script src="app.js?v=2"></script>
</body>
</html>
